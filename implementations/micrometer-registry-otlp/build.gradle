description = 'Publishes Micrometer meters in OTLP format'

dependencies {
    api project(':micrometer-core')

    implementation libs.openTelemetry.proto
    compileOnly libs.grpcApi
    compileOnly libs.grpcStub
    compileOnly libs.grpcProtobuf

    testImplementation project(':micrometer-test')
    testImplementation libs.systemStubsJupiter
    testImplementation libs.restAssured
    testImplementation libs.testcontainers.junitJupiter
    testImplementation libs.awaitility
    testImplementation libs.mockitoCore5
    testImplementation libs.logbackLatest
    testImplementation libs.grpcApi
    testImplementation libs.grpcStub
    testImplementation libs.grpcProtobuf
    testImplementation libs.grpcInprocess
}

dockerTest {
    systemProperty 'otel-collector-image.version', '0.144.0'
}
