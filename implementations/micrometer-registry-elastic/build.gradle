dependencies {
    api project(':micrometer-core')

    implementation libs.slf4jApi

    testImplementation project(':micrometer-test')
    // TODO: upgrade when we figure out how to unbreak things due to this change: https://github.com/testcontainers/testcontainers-java/pull/5099
    testImplementation 'org.testcontainers:elasticsearch:1.16.3'
    testImplementation libs.testcontainers.junitJupiter
    testImplementation libs.jsonPath
    testImplementation libs.logback12
}

dockerTest {
    systemProperty 'elasticsearch-v7-image.name', libs.versions.docker.elasticsearch.v7.get()
    systemProperty 'elasticsearch-v8-image.name', libs.versions.docker.elasticsearch.v8.get()
    systemProperty 'elasticsearch-v9-image.name', libs.versions.docker.elasticsearch.v9.get()
}
