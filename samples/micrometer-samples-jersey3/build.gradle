plugins {
    id 'java'
}

dependencies {
    implementation project(":micrometer-core")

    // Test sample project with SLFJ4 2.x / Logback; see gh-3415
    runtimeOnly(libs.logbackLatest)

    implementation "org.glassfish.jersey.containers:jersey-container-jdk-http:3.1.12"
    runtimeOnly "org.glassfish.jersey.inject:jersey-hk2:3.1.12"
 
    testImplementation "org.glassfish.jersey.test-framework.providers:jersey-test-framework-provider-jdk-http:3.1.12"
    testImplementation libs.junitJupiter
    testRuntimeOnly libs.junitPlatformLauncher
    testImplementation libs.assertj
    testImplementation libs.awaitility
}
